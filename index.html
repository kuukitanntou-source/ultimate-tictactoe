<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
  <title>究極の〇×ゲーム</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<button id="settingsButton">
	  ⚙️
	</button>

	<div id="settingsModal">
	  <div id="settingsContent">

	  <h3>🔊 音量設定</h3>

	  <div class="volume-row">

	    <span>0</span>

	    <input
	      type="range"
	      id="volumeSlider"
	      min="0"
	      max="100"
	      value="50"
	    >

	    <span>100</span>

	  </div>

	  <div class="volume-value">
	  <span id="volumeValue">50</span>%
	</div>

	  <button id="closeSettings">
	    閉じる
	  </button>

	</div>
	</div>

	  <div id="titleScreen">

  <h1>究極〇×ゲーム</h1>

  <p class="subtitle">
    9つの盤面を制覇せよ!
  </p>

  <p class="difficulty-title">
    AIの強さを選択
  </p>

  <div id="difficultyArea">

    <button
      class="difficulty-btn"
      data-level="easy">
      弱い
    </button>

    <button
      class="difficulty-btn"
      data-level="normal">
      普通
    </button>

    <button
      class="difficulty-btn"
      data-level="hard">
      強い
    </button>

  </div>

  <button id="multiBtn">
    2人で遊ぶ
  </button>

  <button id="ruleBtn">
    ルール説明
  </button>

<div id="ruleModal">

  <div id="ruleContent">

    <h2>ルール説明</h2>

    <p>
      小さい〇×ゲームを9個並べたゲームです。
    </p>

    <p>
      小さい盤面を勝つと、
      その盤面を獲得します。
    </p>

    <p>
      大盤面で縦・横・斜めに
      3つ揃えると勝利です。
    </p>

    <button id="closeRuleBtn">
      閉じる
    </button>

  </div>

</div>

	</div>

<div id="gameScreen">

  <div id="gameTop">

    <div id="status">
      〇 の番
    </div>

    <button id="resetButton">
      タイトルに戻る
    </button>

  </div>

  <div class="big-board" id="bigBoard"></div>

  <div id="winLineLayer"></div>

  <div id="winModal">

    <div id="winContent">

      <h2 id="winMessage">
        勝利！
      </h2>

      <button id="backTitleBtn">
        タイトルへ戻る
      </button>

    </div>

  </div>

  <audio id="clickSound">
    <source src="click.mp3" type="audio/mpeg">
  </audio>

   <audio id="placeSound">
    <source src="place.mp3" type="audio/mpeg">
  </audio>

  <audio id="smallWinSound">
    <source src="smallwin.mp3" type="audio/mpeg">
  </audio>

  <audio id="bigWinSound">
    <source src="bigwin.mp3" type="audio/mpeg">
  </audio>

</div>

  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>
    eruda.init();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <script src="script.js"></script>

</body>
</html>
