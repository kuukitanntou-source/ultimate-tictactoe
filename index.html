<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
  <title>究極の〇×ゲーム</title>

  <style>

   body {

  display: flex;
  justify-content: center;
  align-items: center;

  flex-direction: column;

  min-height: 100vh;

  background: #1f4d2e;

  font-family: sans-serif;

  overflow: hidden;
}

    .big-board {

      display: grid;

      grid-template-columns:
        repeat(3, auto);

      gap: 10px;

      overflow: visible;

      position: relative;

    }

    .small-board {
      display: grid;
      grid-template-columns:
  	repeat(3, min(18vw, 60px));
      gap: 3px;

      padding: 5px;
      background: #444;

      position: relative;

      overflow: visible;

      isolation: isolate;

    }

    .cell {
      width: min(18vw, 60px);
      height: min(18vw, 60px);

      background: #1f4d2e;
      border: 1px solid #5f8f6f;

      box-shadow:
	inset 0 0 5px rgba(0,0,0,0.5),
	inset 0 0 10px rgba(255,255,255,0.05);

      display: flex;
      justify-content: center;
      align-items: center;

      font-size: min(8vw, 32px);
      cursor: pointer;

      user-select: none;

	font-family: cursive;
	font-weight: bold;

	text-shadow:
	  0 0 2px white,
	  0 0 6px rgba(255,255,255,0.5);
     }

    .cell:hover {
      background: #ddd;
    }

	@keyframes chalkWrite {

	  0% {
	    transform: scale(0.2) rotate(-10deg);
	    opacity: 0;
	  }

	  60% {
	    transform: scale(1.2) rotate(5deg);
	    opacity: 1;
	  }

	  100% {
	    transform: scale(1);
	  }

	}

	.chalk-animation {

	  animation: chalkWrite 0.25s ease;

	}

	.draw-circle {

	  stroke-dasharray: 400;
	  stroke-dashoffset: 400;

	  animation: drawCircle 0.8s linear forwards;
	}

	@keyframes drawCircle {

	  to {
	    stroke-dashoffset: 0;
	  }

	}

	.draw-line {

	  stroke-dasharray: 200;
	  stroke-dashoffset: 200;

	  animation: drawLine 0.4s linear forwards;
	}

	.draw-line.delay {

	  animation-delay: 0.2s;
	}

	@keyframes drawLine {

	  to {
	    stroke-dashoffset: 0;
	  }

	}

    .won {
      pointer-events: none;
      opacity: 0.7;
    }

	.draw-board {

	  pointer-events: none;
	  opacity: 0.4;

	}

	.win-cell {
	  
	  box-shadow: 0 0 30px gold;
	  animation: glow 1s infinite alternate;

	}

	@keyframes glow {

	  from {
	    background: yellow;
	  }

	  to {
	    background: gold;
	  }

	}

     .winner-text {

      position: absolute;

      inset: 0;

      display: flex;
      justify-content: center;
      align-items: center;

      pointer-events: none;

      z-index: 10;
    }

    .big-winner {

      color: blue;
    }

    #status {

     font-size: 50px;

     font-weight: bold;

     margin-bottom: 30px;
   }

    #resetButton {

     padding: 10px 20px;

     font-size: 18px;

     cursor: pointer;

     margin-bottom: 50px;
   }

	.win-line {

	  position: absolute;

	  width: 0;
	  height: 20px;

	  background: gold;

	  border-radius: 999px;

	  box-shadow:
	    0 0 10px gold,
	    0 0 20px orange;

	  transform-origin: 0 50%;
	  
	  z-index: 20;

	  animation: drawWinLine 0.5s forwards;
	}

	@keyframes drawWinLine {

	  to {
	    width: 650px;
	  }

	}

	@keyframes drawVertical {

	  to {
	    height: 660px;
	  }

	}
	

	@keyframes drawDiagonal {

	  to {
	    width: 900px;
	  }

	}

	@keyframes drawWinLineMobile {

	  to {
	    width: 450px;
	  }

	}

	@keyframes drawVerticalMobile {

	  to {
	    height: 470px;
	  }

	}

	@keyframes drawDiagonalMobile {

	  to {
	    width: 630px;
	  }

	}

	@media (max-width: 768px) {

 	html,
 	 body {
	margin: 0;
	  padding: 0;
 	   overflow-x: hidden;

 	 }
	
	  .big-board {

	    gap: 5px;

		width: fit-content;

	  }

	  .small-board {

	    grid-template-columns:
	      repeat(3, min(13vw, 42px));

	    padding: 3px;

	  }

.big-board {

  transform: scale(0.95);

  transform-origin: top center;

}

	  .cell {

	    width: 40px;
  	    height: 40px;

	  }

	  #status {

	    font-size: 22px;

	  }

	  #resetButton {

	    font-size: 16px;

	  }

	  #titleScreen {

	    padding-top: 20px;

	  }

	}

	#modeSelect {

	  display: flex;

	  gap: 10px;

	  margin-bottom: 20px;
	}

	.active-mode {

	  background: gold;

	  color: black;

	  font-weight: bold;

	  box-shadow: 0 0 10px gold;

	}

	#titleScreen {
  	text-align: center;
  	padding-top: 40px;
	}

	#titleScreen h1 {

	  font-size: 72px;

	  white-space: nowrap;

	}

	@media (max-width: 768px) {

	  #titleScreen h1 {

	    font-size: 56px;

	  }

	#gameScreen {

 	 width: 100%;

 	 display: flex;

 	 flex-direction: column;

 	 align-items: center;

	}

	}


	#titleScreen button {
	  display: block;
	  margin: 10px auto;
	  padding: 10px 20px;
	  font-size: 18px;
	}

	#multiBtn {

	  margin-top: 30px;

	}

	#ruleBtn {

	  margin-top: 30px !important;

	}

	#difficultyArea {

  	display: flex;
	  flex-direction: column;
	  align-items: center;

	  gap: 6px;

	  margin-bottom: 40px;

	}

	.difficulty-btn {

	  width: 220px;
	  height: 60px;

	  font-size: 28px;

	  border-radius: 15px;

	}

	.selected-difficulty {

	  background: gold;

	  color: black;

	  transform: scale(1.08);

	  box-shadow:
	    0 0 20px gold,
	    0 0 40px gold;

	}

	#gameScreen {
	  display: none;

	position: relative;
	}

	#gameTop {

	  width: 100%;

	  display: flex;

	  flex-direction: column;

	  align-items: center;

	  margin-bottom: 30px;

	}

	.subtitle {

	  color: #fff;

	  font-size: 22px;

	  font-weight: bold;

	}

	.difficulty-title {

	  color: gold;

	  font-size: 26px;

	  font-weight: bold;

	}

	#titleScreen button {

	  width: 180px;
	  height: 50px;

	  font-size: 22px;

	  border: none;

	  border-radius: 10px;

	  cursor: pointer;

	 transition: all 0.1s;

	}

	#titleScreen button:hover {

	  transform: scale(1.05);
	}
	
	#titleScreen button:active {

	  transform: scale(0.85);

	}

	#titleScreen h1 {

	  text-shadow:
	    0 0 10px gold,
	    0 0 20px gold;

	}

	#ruleModal {

	  display: none;

	  position: fixed;

	  inset: 0;

	  background:
	    rgba(0,0,0,0.7);

	  z-index: 999;

	  justify-content: center;
	  align-items: center;

	}

	#ruleContent {

	  width: 80%;
	  max-width: 500px;

	  background: white;

	  color: black;

	  padding: 30px;

	  border-radius: 15px;

	  text-align: center;

	}

	#ruleContent h2 {

	  margin-top: 0;

	}

	#closeRuleBtn {

	  margin-top: 20px;

	  padding: 10px 20px;

	}

	#ruleContent {

	  animation:
	    popup 0.25s ease;

	}

	@keyframes popup {

	  from {

	    transform: scale(0.7);

	    opacity: 0;

	  }

	  to {

	    transform: scale(1);

	    opacity: 1;

	  }

	}

	.menu-title {

	  font-size: 22px;

	  font-weight: bold;

	  color: gold;

	  margin-top: 20px;
	  margin-bottom: 10px;

	}

	button {

	  box-shadow:
	    0 4px 8px rgba(0,0,0,0.3);

	}

	#winModal {

	  display: none;

	  position: fixed;

	  top: 0;
	  left: 0;

	  width: 100%;
	  height: 100%;

	  background: rgba(0,0,0,0.7);

	  justify-content: center;
	  align-items: flex-start;

	  padding-top: 20px;

	  z-index: 9999;

	
	  box-sizing: border-box;

	}

	#winContent {

	  background: white;

	  padding: 25px;

	  border-radius: 15px;

	  text-align: center;

	  width: 80%;

	  max-width: 320px;

	  box-sizing: border-box;

	  position: fixed;

	  animation:
	  popupShow 0.4s ease;

	}

	#winMessage {

	  font-size: 27px;

	  margin-bottom: 20px;

	}

	#playAgainBtn,
	#backTitleBtn {

	  display: block;

	  margin: 10px auto;

	  width: 180px;

	height: 50px;

  	font-size: 20px;
	}

	.blue-win {

	  box-shadow:
	    0 0 10px skyblue,
	    0 0 25px skyblue,
	    0 0 50px skyblue;

	}

	.red-win {

	  box-shadow:
	    0 0 10px tomato,
	    0 0 25px tomato,
	    0 0 50px tomato;

	}

	@keyframes popupShow {

	  0% {

	    transform: scale(0.6);

	    opacity: 0;

	  }

	  70% {

	    transform: scale(1.2);

	  }

	  100% {

	    transform: scale(1);

	    opacity: 1;

	  }

	}

	#winLineLayer {

	  position: absolute;

	  left: 0;
	  top: 0;

	  width: 100%;
	  height: 100%;

	  pointer-events: none;

	  z-index: 20;
	}

  </style>
</head>

<body>

  <div id="titleScreen">

  <h1>究極〇×ゲーム</h1>

  <p class="subtitle">
    9つの盤面を制覇せよ!
  </p>

  <p class="difficulty-title">
    AIの強さを選択
  </p>

  <div id="difficultyArea">

    <button
      class="difficulty-btn"
      data-level="easy">
      弱い
    </button>

    <button
      class="difficulty-btn"
      data-level="normal">
      普通
    </button>

    <button
      class="difficulty-btn"
      data-level="hard">
      強い
    </button>

  </div>

  <button id="multiBtn">
    2人で遊ぶ
  </button>

  <button id="ruleBtn">
    ルール説明
  </button>

<div id="ruleModal">

  <div id="ruleContent">

    <h2>ルール説明</h2>

    <p>
      小さい〇×ゲームを9個並べたゲームです。
    </p>

    <p>
      小さい盤面を勝つと、
      その盤面を獲得します。
    </p>

    <p>
      大盤面で縦・横・斜めに
      3つ揃えると勝利です。
    </p>

    <button id="closeRuleBtn">
      閉じる
    </button>

  </div>

</div>

</div>

<div id="gameScreen">

  <div id="gameTop">

    <div id="status">
      〇 の番
    </div>

    <button id="resetButton">
      タイトルに戻る
    </button>

  </div>

  <div class="big-board" id="bigBoard"></div>

  <div id="winLineLayer"></div>

  <div id="winModal">

    <div id="winContent">

      <h2 id="winMessage">
        勝利！
      </h2>

      <button id="backTitleBtn">
        タイトルへ戻る
      </button>

    </div>

  </div>

  <audio id="clickSound">
    <source src="click.mp3" type="audio/mpeg">
  </audio>


  <audio id="clickSound">
    <source src="click.mp3" type="audio/mpeg">
  </audio>

  <audio id="placeSound">
    <source src="place.mp3" type="audio/mpeg">
  </audio>

  <audio id="smallWinSound">
    <source src="smallwin.mp3" type="audio/mpeg">
  </audio>

  <audio id="bigWinSound">
    <source src="bigwin.mp3" type="audio/mpeg">
  </audio>

</div>
<script>

	const titleScreen =
	  document.getElementById(
	    "titleScreen"
	  );

	const gameScreen =
	  document.getElementById(
	    "gameScreen"
	  );

	document
	  .querySelectorAll(
	    ".difficulty-btn"
	  )
	  .forEach(button => {

	    button.addEventListener(
	      "click",
	      () => {

        aiLevel =
          button.dataset.level;

	 document
          .querySelectorAll(
            ".difficulty-btn"
          )
          .forEach(b =>
            b.classList.remove(
              "selected-difficulty"
            )
          );

        button.classList.add(
          "selected-difficulty"
        );

        titleScreen.style.display =
          "none";

        gameScreen.style.display =
          "block";

        gameMode = "ai";

        console.log(
          "難易度:",
          aiLevel
        );

      }
    );

});

	document
	  .getElementById("multiBtn")
	  .addEventListener("click", () => {

	    titleScreen.style.display =
	      "none";

	    gameScreen.style.display =
	      "block";

	

});
    const bigBoard = document.getElementById("bigBoard");
    const statusText = document.getElementById("status");
    const resetButton =
      document.getElementById("resetButton");

	// リセット
	resetButton.addEventListener("click", () => {

	  location.reload();

	});

	const ruleBtn =
	  document.getElementById(
	    "ruleBtn"
	  );

	const difficultyButtons =
	  document.querySelectorAll(
	    ".difficulty-btn"
	  );

	difficultyButtons.forEach(btn => {

	  btn.addEventListener(
	    "click",
	    () => {

	      aiLevel =
	        btn.dataset.level;

console.log(
        "難易度:",
        aiLevel
      );
	    }
	  );

	});

	const ruleModal =
	  document.getElementById(
	    "ruleModal"
	  );

	const closeRuleBtn =
	  document.getElementById(
	    "closeRuleBtn"
	  );

	ruleBtn.addEventListener(
	  "click",
	  () => {

	    ruleModal.style.display =
	      "flex";

	  }
	);

	closeRuleBtn.addEventListener(
	  "click",
	  () => {

	    ruleModal.style.display =
	      "none";

	  }
	);

	ruleModal.addEventListener(
	  "click",
	  (e) => {

	    if (
	      e.target === ruleModal
	    ) {

	      ruleModal.style.display =
	        "none";

	    }

	  }
	);

document
  .querySelectorAll("button")
  .forEach(button => {

    button.addEventListener(
      "click",
      () => {

        clickSound.currentTime = 0;

        clickSound.play();

      }
    );

});

    let currentPlayer = "〇";

    let gameMode = "pvp";

    let aiLevel = "normal";

    let gameOver = false;

	function checkFullDraw() {

	  if (gameOver) {
	    return;
	  }

	  const boards =
	    document.querySelectorAll(
	      ".small-board"
	    );

	  let finished = true;

	  boards.forEach(board => {

	    if (
	      !board.classList.contains("won") &&
	      !board.classList.contains("draw-board")
	    ) {

	      finished = false;

	    }

	  });

	  if (finished) {

	    gameOver = true;

	    winMessage.textContent =
	      "🤝 引き分け！";

	    winModal.style.display =
	      "flex";

	  }

	}

	const winModal =
	  document.getElementById(
	    "winModal"
	  );

	const winMessage =
	  document.getElementById(
	    "winMessage"
	  );

	const backTitleBtn =
	  document.getElementById(
	    "backTitleBtn"
	  );

    // 大きい盤面の勝者保存
    const bigBoardState = [
      "", "", "",
      "", "", "",
      "", "", ""
    ];

    const winPatterns = [
      [0,1,2],
      [3,4,5],
      [6,7,8],
      [0,3,6],
      [1,4,7],
      [2,5,8],
      [0,4,8],
      [2,4,6]
    ];

    // 小さい盤面を9個作る
    for (let i = 0; i < 9; i++) {

      const smallBoard = document.createElement("div");
      smallBoard.classList.add("small-board");

      const cells = [];

      // 小さいマスを9個作る
      for (let j = 0; j < 9; j++) {

        const cell = document.createElement("div");
        cell.classList.add("cell");

	cell.boardIndex = i;
	cell.cellIndex = j;

        cells.push(cell);

       cell.addEventListener("click", () => {

  	if (cell.innerHTML !== "") {
  	  return;
  	}

  	makeMove(
  	  cell,
  	  currentPlayer
  	);

  	// アニメ終了後に削除
  	setTimeout(() => {

  	  cell.classList.remove(
  	    "chalk-animation"
  	  );

	  }, 250);

	  if (currentPlayer === "〇") {
	    cell.style.color = "blue";
	  } else {
	    cell.style.color = "red";
	  }

	  checkSmallBoardWinner(
	    cells,
	    smallBoard,
	    i
	  );

	if (gameOver) {
	  return;
	}

	  currentPlayer =
	    currentPlayer === "〇"
	      ? "×"
	      : "〇";

	  statusText.textContent =
	    currentPlayer + " の番";

	  if (
	    gameMode === "ai" &&
	    currentPlayer === "×"
	  ) {

	    setTimeout(() => {

	      aiMove();

	    }, 500);

	  }

	});

        smallBoard.appendChild(cell);
      }

      bigBoard.appendChild(smallBoard);
    }

    // 小さい盤面勝利判定
    function checkSmallBoardWinner(
      cells,
      smallBoard,
      boardIndex
    ) {

      for (let pattern of winPatterns) {

        const [a, b, c] = pattern;

        if (
	  cells[a].dataset.player &&
	  cells[a].dataset.player === cells[b].dataset.player &&
	  cells[a].dataset.player === cells[c].dataset.player
	) {

          const winner =
            cells[a].dataset.player;

          smallBoard.classList.add("won");

	smallWinSound.currentTime = 0;
	smallWinSound.play();

          const winnerText =
            document.createElement("div");

          winnerText.classList.add("winner-text");

          if (winner === "〇") {

	  winnerText.innerHTML = `

	    <svg viewBox="0 0 160 160">

	      <circle
	        cx="80"
	        cy="80"
	        r="55"

	        stroke="skyblue"
	        stroke-width="8"

	        fill="none"

	        class="draw-circle"
	      />

	    </svg>
	  `;

	} else {

	  winnerText.innerHTML = `

	    <svg viewBox="0 0 160 160">

	      <!-- 1本目 -->
	      <line
	        x1="30"
	        y1="30"
	        x2="130"
	        y2="130"

	        stroke="tomato"
	        stroke-width="8"

	        class="draw-line"
	      />

	      <!-- 2本目 -->
	      <line
	        x1="130"
	        y1="30"
	        x2="30"
	        y2="130"

	        stroke="tomato"
	        stroke-width="8"

	        class="draw-line delay"
	      />

	    </svg>
	  `;

	}

          smallBoard.appendChild(winnerText);

          // 大きい盤面記録
          bigBoardState[boardIndex] = winner;

          // 大きい盤面勝利判定
          checkBigBoardWinner();

	checkFullDraw();

          return;
        }
      }
	// 引き分け判定
	let isDraw = true;

	for (let cell of cells) {

	  if (!cell.dataset.player) {
	    isDraw = false;
	  }

	}

	if (isDraw) {

	  smallBoard.classList.add("draw-board");

	}
    }

	function makeMove(cell, player) {

	  if (cell.innerHTML !== "") {
	    return false;
	  }

	  cell.dataset.player = player;

	  if (player === "〇") {

	placeSound.currentTime = 0;
	    placeSound.play();

	    cell.innerHTML = `
	      <svg viewBox="0 0 50 50">
	        <circle
	          cx="25"
	          cy="25"
	          r="18"
	          stroke="skyblue"
	          stroke-width="4"
	          fill="none"
	          class="draw-circle"
	        />
	      </svg>
	    `;

	  } else {

	placeSound.currentTime = 0;
	    placeSound.play();

	    setTimeout(() => {

	      placeSound.currentTime = 0;
	      placeSound.play();

	    }, 150);

	    cell.innerHTML = `
	      <svg viewBox="0 0 50 50">
	        <line
	          x1="10"
	          y1="10"
	          x2="40"
	          y2="40"
	          stroke="tomato"
	          stroke-width="4"
	          class="draw-line"
	        />

	        <line
	          x1="40"
	          y1="10"
	          x2="10"
	          y2="40"
	          stroke="tomato"
	          stroke-width="4"
	          class="draw-line delay"
	        />
	      </svg>
	    `;
	  }
	return true;
	}

	function aiPlace(cell) {

 	 makeMove(cell, "×");

 	 const smallBoard =
 	   cell.closest(".small-board");

 	 const cells =
 	   Array.from(
 	     smallBoard.querySelectorAll(".cell")
	    );

	  checkSmallBoardWinner(
	    cells,
	    smallBoard,
	    cell.boardIndex
	  );

	if (gameOver) {
	  return;
	}

	  currentPlayer = "〇";

	  statusText.textContent =
	    currentPlayer + " の番";

	}

	function countThreats(boardCells) {

	  let threats = 0;

	  for (let pattern of winPatterns) {

	    const [a,b,c] = pattern;

	    const line = [
	      boardCells[a],
	      boardCells[b],
	      boardCells[c]
	    ];

	    const aiCount =
	      line.filter(
	        cell =>
	          cell.dataset.player === "×"
	      ).length;

	    const emptyCount =
	      line.filter(
	        cell =>
	          !cell.dataset.player
	      ).length;

	    if (
	      aiCount === 2 &&
	      emptyCount === 1
	    ) {
	      threats++;
	    }

	  }

	  return threats;

	}

    // 大きい盤面勝利判定
    function checkBigBoardWinner() {

      for (let pattern of winPatterns) {

        const [a, b, c] = pattern;

        if (
          bigBoardState[a] &&
